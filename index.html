  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1px;align-items:flex-start;margin-bottom:8px\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#b56cf0;margin-top:9px;flex:none\"><\u002Fspan>\n          <div style=\"font-family:'Instrument Serif',serif;font-size:21px;line-height:1.25;color:#fff\">Baked Potatoes – Classic Oven-Baked (serves 4)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding-left:19px;font-family:'Sentient',Georgia,serif;font-weight:200;font-style:italic;font-size:15px;line-height:1.5;color:rgba(255,255,255,.78)\">Based on the “Ultimate Baked Potato” recipe from SeriousEats and similar trusted sources.<span style=\"display:inline-block;width:7px;height:16px;background:#73d6e8;margin-left:2px;vertical-align:-3px;animation:caretA 1s step-end infinite\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- footer input -->\n      <div data-r=\"ischat\" style=\"display:flex;align-items:center;gap:10px;padding:15px 18px 16px;opacity:0;transition:opacity .4s ease\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,.4)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 12a8 8 0 0 1-8 8H4l2-2.5A8 8 0 1 1 20 12Z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:13.5px;color:rgba(255,255,255,.4)\">Type a message<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ TRUST STRIP ============ -->\n<div style=\"position:relative;display:flex;align-items:center;justify-content:center;gap:38px;padding:20px 46px;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.18);flex-wrap:wrap\">\n  <span style=\"font-family:'Fira Code',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.32)\">RUNS IN MLX<\u002Fspan>\n  <span style=\"color:rgba(255,255,255,.15)\">/<\u002Fspan>\n  <span style=\"font-family:'Fira Code',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.32)\">NO ACCOUNT NEEDED<\u002Fspan>\n  <span style=\"color:rgba(255,255,255,.15)\">/<\u002Fspan>\n  <span style=\"font-family:'Fira Code',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.32)\">WORKS OFFLINE<\u002Fspan>\n  <span style=\"color:rgba(255,255,255,.15)\">/<\u002Fspan>\n  <span style=\"font-family:'Fira Code',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.32)\">MCP TOOLS<\u002Fspan>\n  <span style=\"color:rgba(255,255,255,.15)\">/<\u002Fspan>\n  <span style=\"font-family:'Fira Code',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.32)\">OPEN SOURCE<\u002Fspan>\n<\u002Fdiv>\n\n<!-- ============ CAPABILITIES ============ -->\n<div id=\"a-cap\" style=\"position:relative;padding:74px 46px 20px\">\n  <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:34px\">\n    <div>\n      <div style=\"font-family:'Fira Code',monospace;font-size:11.5px;letter-spacing:.14em;color:#73d6e8;margin-bottom:12px\">01 / CAPABILITIES<\u002Fdiv>\n      <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:42px;line-height:1.05;margin:0;color:#fff\">One hold-to-speak gesture,<br>six things it can do.<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"max-width:300px;font-size:14px;line-height:1.6;color:rgba(255,255,255,.5);margin:0 0 6px\">Every mode runs on a local model. Pick a default, or aim the radial dial at whichever you need.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n    <!-- card template repeated -->\n    <div class=\"aCard\" style=\"padding:24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(115,214,232,.1);border:1px solid rgba(115,214,232,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 12h2M9 6v12M14 3v18M19 9v6M24 11h-2\" stroke=\"#73d6e8\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-size:16.5px;font-weight:700;color:#fff;margin-bottom:7px\">Transcription<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.58;color:rgba(255,255,255,.55);margin:0\">Fast, accurate speech-to-text dropped straight into any focused field. Parakeet for English, Nemotron for ~40 languages.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"aCard\" style=\"padding:24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(115,214,232,.1);border:1px solid rgba(115,214,232,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n        <span style=\"font-size:20px;color:#73d6e8\">✦<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:16.5px;font-weight:700;color:#fff;margin-bottom:7px\">Dictation cleanup<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.58;color:rgba(255,255,255,.55);margin:0\">On-device polish after you stop talking - punctuation, capitalization, numbers, and stripped-out “um”s and “uh”s.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"aCard\" style=\"padding:24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(115,214,232,.1);border:1px solid rgba(115,214,232,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n        <span style=\"font-size:19px;color:#73d6e8\">✎<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:16.5px;font-weight:700;color:#fff;margin-bottom:7px\">Rewrite in place<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.58;color:rgba(255,255,255,.55);margin:0\">Highlight text in any app, hold the shortcut, and speak an edit. Mispher replaces the selection where it sits.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"aCard\" style=\"padding:24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(115,214,232,.1);border:1px solid rgba(115,214,232,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n        <span style=\"font-size:16px;font-weight:700;color:#73d6e8;font-family:'Satoshi'\">文A<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:16.5px;font-weight:700;color:#fff;margin-bottom:7px\">Translate<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.58;color:rgba(255,255,255,.55);margin:0\">Speak in one language, insert another. Auto-translate everything you dictate, or do a one-off into your target language.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"aCard\" style=\"padding:24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(115,214,232,.1);border:1px solid rgba(115,214,232,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n        <span style=\"font-size:20px;color:#73d6e8\">✶<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:16.5px;font-weight:700;color:#fff;margin-bottom:7px\">Ask · the agent<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.58;color:rgba(255,255,255,.55);margin:0\">Hold, speak a question, and an on-device DeepAgent plans, uses tools, and streams the answer back - reads &amp; updates your Apple Notes too.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"aCard\" style=\"padding:24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025)\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:rgba(115,214,232,.1);border:1px solid rgba(115,214,232,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><rect x=\"1.5\" y=\"1.5\" width=\"6\" height=\"6\" rx=\"1.5\" stroke=\"#73d6e8\" stroke-width=\"1.6\"><\u002Frect><rect x=\"10.5\" y=\"1.5\" width=\"6\" height=\"6\" rx=\"1.5\" stroke=\"#73d6e8\" stroke-width=\"1.6\"><\u002Frect><rect x=\"1.5\" y=\"10.5\" width=\"6\" height=\"6\" rx=\"1.5\" stroke=\"#73d6e8\" stroke-width=\"1.6\"><\u002Frect><rect x=\"10.5\" y=\"10.5\" width=\"6\" height=\"6\" rx=\"1.5\" stroke=\"#73d6e8\" stroke-width=\"1.6\"><\u002Frect><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-size:16.5px;font-weight:700;color:#fff;margin-bottom:7px\">MCP tools<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.58;color:rgba(255,255,255,.55);margin:0\">Connect filesystem, web, or your own MCP servers, then choose which tools the agent may use and how they get approved.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ HOW IT WORKS ============ -->\n<div id=\"a-how\" style=\"position:relative;padding:74px 46px;margin-top:30px\">\n  <div style=\"font-family:'Fira Code',monospace;font-size:11.5px;letter-spacing:.14em;color:#73d6e8;margin-bottom:12px\">02 / HOW IT WORKS<\u002Fdiv>\n  <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:42px;line-height:1.05;margin:0 0 40px;color:#fff\">Hold a key. Aim. Release.<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:420px 1fr;gap:54px;align-items:center\">\n    <!-- radial dial -->\n    <div style=\"position:relative;width:340px;height:340px;margin:0 auto\">\n      <!-- glow -->\n      <div style=\"position:absolute;inset:8px;border-radius:50%;background:radial-gradient(closest-side,rgba(115,214,232,.12),transparent 72%);animation:glowA 5s ease-in-out infinite\"><\u002Fdiv>\n      <!-- disc -->\n      <div style=\"position:absolute;inset:0;border-radius:50%;background:linear-gradient(180deg,#262d36,#191f27);border:1px solid rgba(255,255,255,.09);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 24px 50px rgba(0,0,0,.55)\"><\u002Fdiv>\n      <!-- diagonal slice dividers (X) -->\n      <div style=\"position:absolute;left:50%;top:18px;bottom:18px;width:1px;background:rgba(255,255,255,.1);transform-origin:center;transform:translateX(-.5px) rotate(45deg)\"><\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:18px;bottom:18px;width:1px;background:rgba(255,255,255,.1);transform-origin:center;transform:translateX(-.5px) rotate(-45deg)\"><\u002Fdiv>\n      <!-- Transcribe (top) -->\n      <div style=\"position:absolute;top:34px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px\">\n        <svg width=\"30\" height=\"22\" viewBox=\"0 0 30 22\" fill=\"none\" stroke=\"rgba(255,255,255,.82)\" stroke-width=\"1.9\" stroke-linecap=\"round\"><path d=\"M3 8.5v5M7 6v10M11 3v16M15 1v20M19 3v16M23 6v10M27 8.5v5\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:12.5px;color:rgba(255,255,255,.62);font-weight:600\">Transcribe<\u002Fspan>\n      <\u002Fdiv>\n      <!-- Translate (right) -->\n      <div style=\"position:absolute;right:30px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:7px\">\n        <div style=\"position:relative;width:32px;height:24px\">\n          <div style=\"position:absolute;left:0;top:0;width:18px;height:15px;border:1.7px solid rgba(255,255,255,.82);border-radius:5px 5px 5px 1px;display:flex;align-items:center;justify-content:center;font-family:'Satoshi';font-size:10px;font-weight:700;color:rgba(255,255,255,.85)\">A<\u002Fdiv>\n          <div style=\"position:absolute;right:0;bottom:0;width:18px;height:15px;border:1.7px solid rgba(255,255,255,.82);border-radius:5px 5px 1px 5px;background:#1d232b;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.85)\">文<\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-size:12.5px;color:rgba(255,255,255,.62);font-weight:600\">Translate<\u002Fspan>\n      <\u002Fdiv>\n      <!-- Rewrite (bottom) -->\n      <div style=\"position:absolute;bottom:34px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px\">\n        <svg width=\"28\" height=\"24\" viewBox=\"0 0 28 24\" fill=\"none\"><path d=\"M4 21 L14.5 10.5\" stroke=\"rgba(255,255,255,.82)\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M17 6.3c.2 2.1.6 2.5 2.7 2.7-2.1.2-2.5.6-2.7 2.7-.2-2.1-.6-2.5-2.7-2.7 2.1-.2 2.5-.6 2.7-2.7Z\" fill=\"rgba(255,255,255,.85)\"><\u002Fpath><path d=\"M23 2.6v3.4M21.3 4.3h3.4\" stroke=\"rgba(255,255,255,.82)\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M24 12.4v2.6M22.7 13.7h2.6\" stroke=\"rgba(255,255,255,.82)\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:12.5px;color:rgba(255,255,255,.62);font-weight:600\">Rewrite<\u002Fspan>\n      <\u002Fdiv>\n      <!-- Ask (left) -->\n      <div style=\"position:absolute;left:30px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:7px\">\n        <svg width=\"26\" height=\"24\" viewBox=\"0 0 26 24\" fill=\"rgba(255,255,255,.85)\"><path d=\"M12 4c.6 5 1.4 5.8 6.4 6.4-5 .6-5.8 1.4-6.4 6.4-.6-5-1.4-5.8-6.4-6.4 5-.6 5.8-1.4 6.4-6.4Z\"><\u002Fpath><path d=\"M5 1.5c.18 1.6.5 1.9 2.1 2.1-1.6.18-1.9.5-2.1 2.1-.18-1.6-.5-1.9-2.1-2.1 1.6-.2 1.9-.5 2.1-2.1Z\"><\u002Fpath><path d=\"M21 16c.15 1.4.4 1.65 1.8 1.8-1.4.15-1.65.4-1.8 1.8-.15-1.4-.4-1.65-1.8-1.8 1.4-.15 1.65-.4 1.8-1.8Z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:12.5px;color:rgba(255,255,255,.62);font-weight:600\">Ask<\u002Fspan>\n      <\u002Fdiv>\n      <!-- center hub -->\n      <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:108px;height:108px;border-radius:50%;background:radial-gradient(closest-side,#0d1116,#06090c);border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 14px rgba(0,0,0,.8),0 4px 16px rgba(0,0,0,.5)\">\n        <span style=\"font-size:13px;line-height:1.28;font-weight:500;color:rgba(255,255,255,.58);text-align:center\">Release<br>to cancel<\u002Fspan>\n      <\u002Fdiv>\n      <!-- cursor -->\n      <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" style=\"position:absolute;left:55.5%;top:60.5%;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))\"><path d=\"M4 2 L19 10.5 L12 11.6 L9 19 Z\" fill=\"#fff\" stroke=\"#0c0f14\" stroke-width=\"1.2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <!-- steps -->\n    <div style=\"display:flex;flex-direction:column;gap:6px\">\n      <div style=\"display:flex;gap:18px;padding:20px 4px;border-bottom:1px solid rgba(255,255,255,.07)\">\n        <span style=\"font-family:'Instrument Serif',serif;font-size:30px;color:#73d6e8;line-height:1;width:42px\">1<\u002Fspan>\n        <div><div style=\"font-size:17px;font-weight:700;color:#fff;margin-bottom:5px\">Hold the trigger<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:rgba(255,255,255,.55);margin:0\">Press and hold one key - the default is left <span style=\"font-family:'Fira Code',monospace;font-size:12px;padding:1px 6px;border-radius:5px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)\">⌥<\u002Fspan>. The radial dial appears wherever you are.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;padding:20px 4px;border-bottom:1px solid rgba(255,255,255,.07)\">\n        <span style=\"font-family:'Instrument Serif',serif;font-size:30px;color:#73d6e8;line-height:1;width:42px\">2<\u002Fspan>\n        <div><div style=\"font-size:17px;font-weight:700;color:#fff;margin-bottom:5px\">Aim at a mode<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:rgba(255,255,255,.55);margin:0\">Flick toward Transcribe, Translate, Rewrite, or Ask - or just press an arrow key. Each slice is yours to remap.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;padding:20px 4px;border-bottom:1px solid rgba(255,255,255,.07)\">\n        <span style=\"font-family:'Instrument Serif',serif;font-size:30px;color:#73d6e8;line-height:1;width:42px\">3<\u002Fspan>\n        <div><div style=\"font-size:17px;font-weight:700;color:#fff;margin-bottom:5px\">Release to run<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:rgba(255,255,255,.55);margin:0\">Speak, let go, and the result lands in place. Prefer keys? Give every mode its own shortcut with push-to-talk, trigger, or hold &amp; release.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ PRIVACY ============ -->\n<div id=\"a-priv\" style=\"position:relative;margin:30px 46px;padding:64px 54px;border-radius:22px;border:1px solid rgba(115,214,232,.16);overflow:hidden;background:radial-gradient(700px 420px at 80% 50%,rgba(115,214,232,.12),transparent 65%),linear-gradient(180deg,rgba(18,26,32,.6),rgba(10,13,18,.6))\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(closest-side at 82% 50%,rgba(115,214,232,.08),transparent);animation:glowA 6s ease-in-out infinite\"><\u002Fdiv>\n  <div style=\"position:relative;display:grid;grid-template-columns:1.1fr .9fr;gap:50px;align-items:center\">\n    <div>\n      <div style=\"font-family:'Fira Code',monospace;font-size:11.5px;letter-spacing:.14em;color:#73d6e8;margin-bottom:14px\">03 / PRIVACY BY ARCHITECTURE<\u002Fdiv>\n      <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:46px;line-height:1.04;margin:0 0 18px;color:#fff\">Nothing leaves your Mac.<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.62;color:rgba(255,255,255,.6);margin:0;max-width:480px\">Speech recognition, cleanup, translation, and the agent all run locally in Apple’s MLX framework on Apple Silicon. There is no server to send audio to, no account to create, and nothing to opt out of - because there’s nowhere for your words to go.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25)\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#40d199;box-shadow:0 0 9px #40d199\"><\u002Fspan>\n        <span style=\"font-size:14.5px;color:rgba(255,255,255,.85);font-weight:500\">Audio never touches a network<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25)\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#40d199;box-shadow:0 0 9px #40d199\"><\u002Fspan>\n        <span style=\"font-size:14.5px;color:rgba(255,255,255,.85);font-weight:500\">No accounts, no telemetry, no cloud<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25)\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#40d199;box-shadow:0 0 9px #40d199\"><\u002Fspan>\n        <span style=\"font-size:14.5px;color:rgba(255,255,255,.85);font-weight:500\">Works fully offline, on a plane or off the grid<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25)\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#40d199;box-shadow:0 0 9px #40d199\"><\u002Fspan>\n        <span style=\"font-size:14.5px;color:rgba(255,255,255,.85);font-weight:500\">Open source - audit every line yourself<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ OVERLAY STYLES ============ -->\n<div style=\"position:relative;padding:74px 46px 20px\">\n  <div style=\"font-family:'Fira Code',monospace;font-size:11.5px;letter-spacing:.14em;color:#73d6e8;margin-bottom:12px\">04 / STAYS OUT OF THE WAY<\u002Fdiv>\n  <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:42px;line-height:1.05;margin:0 0 8px;color:#fff\">Pick how recording shows up.<\u002Fh2>\n  <p style=\"font-size:14.5px;line-height:1.6;color:rgba(255,255,255,.5);margin:0 0 36px;max-width:520px\">Three overlay styles, each tuned to be readable but unobtrusive. Voice modes and Ask can even use different ones.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n    <!-- dynamic island -->\n    <div class=\"aCard\" style=\"padding:28px 24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);display:flex;flex-direction:column;align-items:center\">\n      <div style=\"position:relative;height:138px;width:100%;overflow:hidden;border-radius:10px;background:linear-gradient(180deg,#181b20,#0c0e12)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:20px;display:flex;align-items:center;gap:9px;padding:0 9px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.04)\">\n        <\u002Fdiv>\n        <div style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:2;width:264px;background:#000;border:1px solid rgba(255,255,255,.06);border-top:none;border-radius:0 0 20px 20px;box-shadow:0 16px 34px rgba(0,0,0,.6);padding:10px 18px 14px\">\n          <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px\">\n            <svg width=\"8\" height=\"13\" viewBox=\"0 0 9 14\" fill=\"none\"><path d=\"M7 1L2 7l5 6\" stroke=\"rgba(255,255,255,.6)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"10\" stroke=\"#73d6e8\" stroke-opacity=\".4\" stroke-width=\"1.8\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"6\" stroke=\"#73d6e8\" stroke-width=\"1.8\"><\u002Fcircle><path d=\"M12 2v20M2 12h20\" stroke=\"#73d6e8\" stroke-opacity=\".55\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <span style=\"flex:1\"><\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,.5)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 4h-9a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-8\"><\u002Fpath><path d=\"M18.5 3.5a2 2 0 0 1 3 3L13 15l-4 1 1-4 8.5-8.5Z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <span style=\"display:inline-flex;gap:2.5px;align-items:center;height:14px\"><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:7px;animation:eqA .6s ease-in-out infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:12px;animation:eqA .6s ease-in-out .12s infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:8px;animation:eqA .6s ease-in-out .24s infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:11px;animation:eqA .6s ease-in-out .36s infinite\"><\u002Fi><\u002Fspan>\n            <span style=\"font-size:13px;font-weight:500;color:rgba(255,255,255,.92)\">Listening…<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:15.5px;font-weight:700;color:#fff;margin:6px 0 5px;white-space:nowrap\">Dynamic Island<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,.5);margin:0;text-align:center\">Drops from the notch, then expands into the full chat when you need it.<\u002Fp>\n    <\u002Fdiv>\n    <!-- floating -->\n    <div class=\"aCard\" style=\"padding:28px 24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);display:flex;flex-direction:column;align-items:center\">\n      <div style=\"height:138px;display:flex;align-items:center;justify-content:center;width:100%\">\n        <div style=\"display:flex;align-items:center;gap:11px;padding:11px 15px;border-radius:100px;background:linear-gradient(180deg,#202126,#141518);border:1px solid rgba(255,255,255,.09);box-shadow:0 16px 34px rgba(0,0,0,.55);min-width:188px\">\n          <span style=\"display:inline-flex;gap:2.5px;align-items:center;height:14px\"><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:6px;animation:eqA .6s ease-in-out infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:12px;animation:eqA .6s ease-in-out .1s infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:8px;animation:eqA .6s ease-in-out .2s infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:11px;animation:eqA .6s ease-in-out .3s infinite\"><\u002Fi><\u002Fspan>\n          <span style=\"flex:1;font-size:13px;font-weight:500;color:rgba(255,255,255,.92)\">Listening…<\u002Fspan>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#ff5959;box-shadow:0 0 8px rgba(255,89,89,.6)\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:15.5px;font-weight:700;color:#fff;margin:6px 0 5px;white-space:nowrap\">Floating<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,.5);margin:0;text-align:center\">A free pill you can place anywhere - with a mode chip for Rewrite or Translate.<\u002Fp>\n    <\u002Fdiv>\n    <!-- floating notch -->\n    <div class=\"aCard\" style=\"padding:28px 24px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);display:flex;flex-direction:column;align-items:center\">\n      <div style=\"position:relative;height:138px;width:100%;border-radius:10px;overflow:hidden;background:linear-gradient(180deg,#181b20,#0c0e12)\">\n        <!-- mac menu bar -->\n        <div style=\"position:absolute;top:0;left:0;right:0;height:20px;display:flex;align-items:center;gap:9px;padding:0 9px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.04)\">\n          <svg width=\"9\" height=\"11\" viewBox=\"0 0 14 17\" fill=\"rgba(255,255,255,.85)\"><path d=\"M11.5 9c0-1.6.8-2.4 1.4-2.9-.8-1.1-2-1.2-2.4-1.2-1-.1-2 .6-2.5.6s-1.3-.6-2.2-.6C4.2 4.9 3 5.6 2.3 6.8 1 9.1 2 12.5 3.2 14.4c.6.9 1.3 1.9 2.2 1.9.9 0 1.2-.6 2.3-.6s1.4.6 2.3.6 1.5-.9 2.1-1.8c.3-.5.5-1 .7-1.5-1.4-.6-1.5-2.7-1.5-3.6Z\"><\u002Fpath><path d=\"M9.6 3.4c.5-.6.8-1.4.7-2.2-.7 0-1.5.5-2 1.1-.4.5-.8 1.3-.7 2.1.8.1 1.5-.4 2-1Z\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:8.5px;font-weight:700;color:rgba(255,255,255,.85)\">Mispher<\u002Fspan>\n          <span style=\"font-size:8px;color:rgba(255,255,255,.5)\">File<\u002Fspan>\n          <span style=\"font-size:8px;color:rgba(255,255,255,.5)\">Edit<\u002Fspan>\n          <span style=\"flex:1\"><\u002Fspan>\n          <svg width=\"14\" height=\"9\" viewBox=\"0 0 24 12\" fill=\"none\"><rect x=\"1\" y=\"2\" width=\"18\" height=\"8\" rx=\"2.2\" stroke=\"rgba(255,255,255,.5)\" stroke-width=\"1.2\"><\u002Frect><rect x=\"3\" y=\"4\" width=\"11\" height=\"4\" rx=\"1\" fill=\"rgba(255,255,255,.6)\"><\u002Frect><rect x=\"20.4\" y=\"4.5\" width=\"1.8\" height=\"3\" rx=\"1\" fill=\"rgba(255,255,255,.5)\"><\u002Frect><\u002Fsvg>\n          <span style=\"font-family:'Fira Code',monospace;font-size:8px;color:rgba(255,255,255,.6)\">9:41<\u002Fspan>\n        <\u002Fdiv>\n        <!-- notch protruding from the menu bar -->\n        <div style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:2;width:108px;height:20px;border-radius:0 0 10px 10px;background:#000\"><\u002Fdiv>\n        <!-- floating pill -->\n        <div style=\"position:absolute;top:32px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:100px;background:linear-gradient(180deg,#202126,#141518);border:1px solid rgba(255,255,255,.09);box-shadow:0 12px 26px rgba(0,0,0,.55);min-width:172px\">\n          <span style=\"display:inline-flex;gap:2.5px;align-items:center;height:13px\"><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:6px;animation:eqA .6s ease-in-out infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:11px;animation:eqA .6s ease-in-out .1s infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:8px;animation:eqA .6s ease-in-out .2s infinite\"><\u002Fi><i style=\"width:2.5px;border-radius:2px;background:#73d6e8;height:10px;animation:eqA .6s ease-in-out .3s infinite\"><\u002Fi><\u002Fspan>\n          <span style=\"flex:1;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.92)\">Listening…<\u002Fspan>\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#ff5959;box-shadow:0 0 7px rgba(255,89,89,.6)\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:15.5px;font-weight:700;color:#fff;margin:6px 0 5px;white-space:nowrap\">Floating notch<\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,.5);margin:0;text-align:center\">A notch-anchored control bar paired with the floating listening pill.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ MODELS / LANGUAGES ============ -->\n<div id=\"a-models\" style=\"position:relative;padding:74px 46px\">\n  <div style=\"font-family:'Fira Code',monospace;font-size:11.5px;letter-spacing:.14em;color:#73d6e8;margin-bottom:12px\">05 / MODELS &amp; LANGUAGES<\u002Fdiv>\n  <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:42px;line-height:1.05;margin:0 0 36px;color:#fff\">Download the models you want. Run them locally.<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:22px\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start\">\n      <!-- ASR column -->\n      <div>\n        <div style=\"font-family:'Fira Code',monospace;font-size:10.5px;letter-spacing:.12em;color:rgba(255,255,255,.42);margin-bottom:13px;padding-left:2px\">SPEECH RECOGNITION · ASR<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:9px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);min-height:50px\"><div style=\"font-family:'Fira Code',monospace;font-size:9.5px;color:#06222a;background:#73d6e8;padding:3px 7px;border-radius:6px;font-weight:600\">ASR<\u002Fdiv><div style=\"flex:1;min-width:0\"><div style=\"font-size:14.5px;font-weight:700;color:#fff\">Parakeet EOU<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.5)\">English · streaming · ~0.5 GB<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:9px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);min-height:50px\"><div style=\"font-family:'Fira Code',monospace;font-size:9.5px;color:#06222a;background:#73d6e8;padding:3px 7px;border-radius:6px;font-weight:600\">ASR<\u002Fdiv><div style=\"flex:1;min-width:0\"><div style=\"font-size:14.5px;font-weight:700;color:#fff\">Nemotron Multilingual<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.5)\">~40 languages · streaming · ~1.1 GB<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:9px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);min-height:50px\"><div style=\"font-family:'Fira Code',monospace;font-size:9.5px;color:#06222a;background:#73d6e8;padding:3px 7px;border-radius:6px;font-weight:600\">ASR<\u002Fdiv><div style=\"flex:1;min-width:0\"><div style=\"font-size:14.5px;font-weight:700;color:#fff\">Parakeet TDT v3<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.5)\">25 European languages · batch · ~1.1 GB<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:9px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);min-height:50px\"><div style=\"font-family:'Fira Code',monospace;font-size:9.5px;color:#06222a;background:#73d6e8;padding:3px 7px;border-radius:6px;font-weight:600\">ASR<\u002Fdiv><div style=\"flex:1;min-width:0\"><div style=\"font-size:14.5px;font-weight:700;color:#fff\">Parakeet CTC 中文<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.5)\">Mandarin · int8 / fp32 · ~1.1 GB<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:9px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);min-height:50px\"><div style=\"font-family:'Fira Code',monospace;font-size:9.5px;color:#06222a;background:#73d6e8;padding:3px 7px;border-radius:6px;font-weight:600\">ASR<\u002Fdiv><div style=\"flex:1;min-width:0\"><div style=\"font-size:14.5px;font-weight:700;color:#fff\">Qwen3-ASR<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.5)\">Chinese · runs via local llama-server<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- LLM / VLM column -->\n      <div>\n        <div style=\"font-family:'Fira Code',monospace;font-size:10.5px;letter-spacing:.12em;color:rgba(255,255,255,.42);margin-bottom:13px;padding-left:2px\">LANGUAGE &amp; VISION · LIQUIDAI LFM2.5<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:9px 15px;border-radius:11px;border:1px solid rgba(255,255,2
